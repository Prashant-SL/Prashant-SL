<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a2540;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a3a5c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00b4d8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0077b6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="20" fill="url(#bg)"/>
  <!-- M shape as logo mark -->
  <path d="M 40 140 L 40 70 L 70 110 L 100 70 L 100 140" stroke="url(#accent)" stroke-width="10" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- "C" shape -->
  <path d="M 120 80 C 110 65, 135 55, 155 65 M 120 80 L 120 130 C 120 145, 145 150, 160 140" stroke="#00b4d8" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Dot -->
  <circle cx="170" cy="130" r="5" fill="#00b4d8"/>
</svg>
